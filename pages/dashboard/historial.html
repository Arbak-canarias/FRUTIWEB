<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Pedidos - FRUTWEB</title>
    <link rel="stylesheet" href="/css/Styles.css">
</head>
<body>
    <nav>
        <a href="/pages/dashboardcliente.html">← Volver</a>
    </nav>
    <h1>Historial de Pedidos</h1>
    <div class="admin-container">
    <div class="admin-section">
        <h2>Mis pedidos</h2>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Productos</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="historial-pedidos">
                <!-- Las filas de pedidos se insertarán aquí -->
            </tbody>
        </table>
    </div>
</div>
    <script src="/script.js"></script>
    <script>
       document.addEventListener("DOMContentLoaded", async () => {
    const userStr = localStorage.getItem("user");
    const token = localStorage.getItem("token");

    if (!userStr || !token) {
        alert("Debes iniciar sesión para ver tus pedidos.");
        window.location.href = "/index.html";
        return;
    }

    const user = JSON.parse(userStr);
    const historialDiv = document.getElementById("historial-pedidos");

    try {
        // Llamada al backend para obtener pedidos del cliente
        const res = await fetch(`http://localhost:3000/api/pedidos/usuario/${user.id}`, {
            headers: { "Authorization": `Bearer ${token}` }
        });

        if (!res.ok) {
            historialDiv.innerHTML = `<p style="text-align:center;color:red;">No se pudieron cargar los pedidos.</p>`;
            return;
        }

        const pedidos = await res.json();

        if (!pedidos || pedidos.length === 0) {
            historialDiv.innerHTML = "<p style='text-align:center;'>No tienes pedidos realizados.</p>";
            return;
        }

        // Renderizamos cada pedido
        pedidos.forEach(pedido => {
              
            const total = parseFloat(pedido.total) || 0;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>#${pedido.id}</td>
                <td>${new Date(pedido.fecha).toLocaleString()}</td>
                <td>${total.toFixed(2)} €</td>
                <td>
                    ${(pedido.items || []).map(item => `${item.cantidad} x ${item.nombre}`).join("<br>")}
                </td>
                <td>${pedido.estado || "pendiente"}</td>
            `;

            historialDiv.appendChild(tr);
        });

    } catch (error) {
        console.error("Error cargando pedidos:", error);
        historialDiv.innerHTML = "<p style='text-align:center;color:red;'>Error al conectar con el servidor.</p>";
    }
});
    </script>
</body>
</html>
